<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motif Window Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="page-header">
      <h1>Motif Explorer</h1>
      <div id="global-legend" class="legend header-legend"></div>
      <br>
      <div class="motif-selector-wrap">
        <label for="motif-select">Motif CSV:</label>
        <select id="motif-select">
          <option value="motifs/motif_ed.csv">motif_ed.csv</option>
          <option value="motifs/motif_merged.csv" selected>motif_merged.csv</option>
        </select>
      </div>
      <br>
      <div class="matched-slider-wrap">
        <label for="matched-distance-slider">Max matched
          <span
            class="help-dashed-label"
            data-tooltip="The lower the distance, 
            the more similar a match is to an identified motif (pattern). 
            By filtering out higher distance entries, 
            you can focus on the more similar matches."
            >distance</span
          >:
        </label>
        <input id="matched-distance-slider" type="range" min="0" max="10" step="0.01" value="10" />
        <span id="matched-distance-value">10 / 10</span>
      </div>
      <br>
      <div class="topk-slider-wrap">
        <label for="topk-motif-slider"
          >Show
          <span
            class="help-dashed-label"
            data-tooltip="Choose the number of motifs you want to display. Note that large number may lead to slow loading!"
            >top motifs</span>
          :</label
        >
        <input id="topk-motif-slider" type="range" min="1" max="32" step="1" value="32" />
        <span id="topk-motif-value">32 / 32</span>
      </div>
    </header>

    <main>
      <section id="status" class="status">Loading data...</section>
      <section class="viz-section viz-scroll">
        <div class="viz-scroll-content">
          <div id="thumbnail-legend" class="legend thumbnail-legend"></div>
          <div class="thumbnail-options">
            <label for="stack-filled-thumbnails-toggle">
              <input id="stack-filled-thumbnails-toggle" type="checkbox" />
              Hide empty features
            </label>
          </div>
          <h2 class="section-title">Library</h2>
          <div id="all-motif-thumbnails" class="all-motif-thumbnails"></div>
          <h2 class="section-title">Top Motifs</h2>
          <section id="charts" class="charts-grid"></section>
          <h2 class="section-title">Corresponding Sequences</h2>
          <section id="student-charts" class="charts-grid"></section>
        </div>
      </section>
    </main>
    <div id="sticky-x-scroll" aria-label="Horizontal scrollbar">
      <div id="sticky-x-scroll-inner"></div>
    </div>
    <div id="tooltip" class="tooltip"></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="script.js"></script>
  </body>
</html>
